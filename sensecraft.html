<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>E1002 A股面板</title>
    <style>
/*
 * reTerminal E1002 A股面板 — Spectra 6 纯色样式
 * 硬性约束：只能用 黑/白/红/黄/蓝/绿 6 个纯色。
 * 禁止浅灰、半透明、渐变、剪裁路径、米色——这些在 6 色屏上会抖动成颗粒。
 * 视觉层级用 字号/字重/边框 区分，不用颜色明暗区分。
 */
:root {
  --black: #000000;
  --white: #ffffff;
  --red: #d0021b;      /* 涨 / 风险 */
  --green: #2e7d32;    /* 跌 */
  --yellow: #f5a623;   /* 信号 / 强调底色 */
  --blue: #1565c0;     /* 标题 / 标签 / 平 */
}

* {
  box-sizing: border-box;
}

body {
  margin: 0;
  min-height: 100vh;
  display: grid;
  place-items: center;
  background: var(--white);   /* 仅浏览器预览；widget 模式下被 build_dist 覆盖为白 */
  color: var(--black);
  font-family: "Arial", "PingFang SC", "Microsoft YaHei", sans-serif;
}

/* 设备外壳，仅本地预览模拟设备边框；widget 模式下被 build_dist 改为透明无边框，不上屏 */
.device-shell {
  width: 860px;
  height: 540px;
  display: grid;
  place-items: center;
  background: var(--black);
  border: 10px solid var(--black);
}

.panel {
  width: 800px;
  height: 480px;
  overflow: hidden;
  background: var(--white);
  border: 3px solid var(--black);
  padding: 18px;
}

.topbar {
  height: 72px;
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  border-bottom: 3px solid var(--black);
}

.eyebrow,
.section-title {
  color: var(--blue);
  font-size: 14px;
  font-weight: 800;
}

h1 {
  margin: 2px 0 0;
  font-size: 34px;
  line-height: 1;
  color: var(--black);
}

.clock-block {
  min-width: 160px;
  text-align: right;
}

.clock-block time {
  display: block;
  color: var(--black);
  font-size: 15px;
  line-height: 1.2;
  font-weight: 800;
}

.clock-block strong {
  display: block;
  margin-top: 3px;
  font-size: 33px;
  line-height: 1;
  color: var(--black);
}

.market-grid {
  height: 370px;
  display: grid;
  grid-template-columns: 245px 312px 189px;
  gap: 12px;
  padding-top: 13px;
}

.index-panel,
.stocks-panel,
.side-panel > section {
  border: 2px solid var(--black);
  background: var(--white);
}

.index-panel,
.stocks-panel {
  padding: 12px;
}

.index-value {
  margin-top: 9px;
  font-size: 52px;
  line-height: 1;
  font-weight: 900;
  color: var(--black);
}

.change-row {
  margin-top: 7px;
  display: inline-flex;
  align-items: center;
  min-height: 29px;
  padding: 4px 8px;
  border: 2px solid var(--black);
  font-size: 17px;
  font-weight: 800;
}

.up {
  color: var(--red);
}

.down {
  color: var(--green);
}

.flat {
  color: var(--blue);
}

/* 分时折线：去掉渐变/剪裁/半透明，改为实色边框容器；
   折线由 app.js 用 <svg> + var(--blue) 实色绘制；无数据时 app.js 隐藏整个区域 */
.sparkline {
  height: 70px;
  margin-top: 13px;
  border: 2px solid var(--black);
  background: var(--white);
}

.sparkline svg {
  display: block;
  width: 100%;
  height: 100%;
}

.analysis-box {
  margin-top: 13px;
  padding: 9px;
  border: 2px solid var(--black);
  background: var(--yellow);
}

.analysis-label {
  font-size: 13px;
  color: var(--black);
  font-weight: 800;
}

.analysis-box p {
  margin: 5px 0 0;
  font-size: 16px;
  line-height: 1.36;
  font-weight: 700;
  color: var(--black);
}

.stock-list {
  display: grid;
  gap: 8px;
  margin-top: 10px;
}

.stock-row {
  display: grid;
  grid-template-columns: 77px 86px 71px 50px;
  align-items: center;
  min-height: 50px;
  border-bottom: 2px solid var(--black);
}

.stock-row:last-child {
  border-bottom: 0;
}

.stock-name {
  min-width: 0;
}

.stock-name strong,
.stock-name span,
.metric-label,
.weather-meta,
.status-panel span {
  display: block;
}

.stock-name strong {
  font-size: 18px;
  line-height: 1.1;
  color: var(--black);
}

/* 次要信息（代码/标签/元数据）：原为浅灰，改黑 + 小字 + 中等字重，靠字号字重区分层级 */
.stock-name span,
.metric-label,
.weather-meta,
.status-panel span {
  color: var(--black);
  font-size: 12px;
  font-weight: 800;
}

.stock-price {
  font-size: 24px;
  font-weight: 900;
  line-height: 1;
  color: var(--black);
}

.stock-change {
  font-size: 17px;
  font-weight: 800;
}

.signal {
  min-height: 32px;
  display: grid;
  place-items: center;
  border: 2px solid var(--black);
  font-size: 13px;
  font-weight: 900;
  white-space: nowrap;
  color: var(--black);
}

.signal-watch {
  background: var(--yellow);
}

.signal-hold {
  background: var(--white);
}

.signal-risk {
  background: var(--red);
  color: var(--white);
}

.side-panel {
  display: grid;
  grid-template-rows: 101px 190px 55px;
  gap: 12px;
}

.side-panel > section {
  padding: 10px;
}

.weather-main {
  margin-top: 8px;
  display: flex;
  align-items: baseline;
  justify-content: space-between;
}

.weather-main span {
  color: var(--blue);
  font-size: 28px;
  font-weight: 900;
}

.weather-main strong {
  font-size: 34px;
  line-height: 1;
  color: var(--black);
}

.advice-panel ul {
  margin: 8px 0 0;
  padding: 0;
  list-style: none;
  display: grid;
  gap: 8px;
}

.advice-panel li {
  min-height: 34px;
  padding-left: 9px;
  border-left: 7px solid var(--blue);
  font-size: 14px;
  line-height: 1.22;
  font-weight: 800;
  color: var(--black);
}

.status-panel {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8px;
}

.status-panel div {
  display: flex;
  flex-direction: column;
  justify-content: center;
}

.status-panel strong {
  font-size: 18px;
  color: var(--black);
}

</style>
  </head>
  <body>
    <main class="device-shell" aria-label="reTerminal E1002 A股面板预览">
      <section class="panel" id="panel">
        <header class="topbar">
          <div>
            <div class="eyebrow" id="eyebrow">A股观察</div>
            <h1>交易日面板</h1>
          </div>
          <div class="clock-block">
            <time id="dateText">--</time>
            <strong id="timeText">--:--</strong>
          </div>
        </header>

        <section class="market-grid">
          <article class="index-panel">
            <div class="section-title" id="indexTitle">上证指数</div>
            <div class="index-value" id="indexValue">--</div>
            <div class="change-row" id="indexChange">--</div>
            <div class="sparkline" aria-hidden="true" id="indexSparkline"></div>
            <div class="analysis-box">
              <div class="analysis-label">盘面结论</div>
              <p id="marketSummary">--</p>
            </div>
          </article>

          <article class="stocks-panel">
            <div class="section-title">自选股</div>
            <div class="stock-list" id="stockList"></div>
          </article>

          <aside class="side-panel">
            <section class="weather-panel">
              <div class="section-title">天气</div>
              <div class="weather-main">
                <span id="weatherIcon">晴</span>
                <strong id="weatherTemp">--</strong>
              </div>
              <div class="weather-meta" id="weatherMeta">--</div>
            </section>

            <section class="advice-panel">
              <div class="section-title">今日动作</div>
              <ul id="adviceList"></ul>
            </section>

            <section class="status-panel">
              <div>
                <span>刷新</span>
                <strong id="refreshText">--</strong>
              </div>
              <div>
                <span>模式</span>
                <strong>低频</strong>
              </div>
            </section>
          </aside>
        </section>
      </section>
    </main>

    <script>window.PANEL_DATA = {"updatedAt": "2026-06-22T18:46:30+08:00", "source": {"market": "Sina Finance hq.sinajs.cn", "weather": "Open-Meteo"}, "index": {"name": "上证指数", "code": "000001.SH", "price": 4163.1, "change": 72.62, "changePct": 1.78, "open": 4093.95, "high": 4164.42, "low": 4070.17, "volume": 743699355, "amount": 1704000421651.0, "trend": "指数偏强", "risk": "相对强", "quoteTime": "2026-06-22T15:30:39+08:00", "volumeTone": "成交额约17040亿", "series": []}, "stocks": [{"name": "兴蓉环境", "code": "000598.SZ", "price": 6.69, "change": -0.1, "changePct": -1.47, "open": 6.76, "high": 6.76, "low": 6.48, "volume": 36225268, "amount": 238901631.7, "trend": "盘中偏弱", "risk": "弱于指数", "quoteTime": "2026-06-22T15:00:00+08:00"}, {"name": "华润三九", "code": "000999.SZ", "price": 23.5, "change": 0.02, "changePct": 0.09, "open": 23.3, "high": 23.55, "low": 22.6, "volume": 11357250, "amount": 261414840.36, "trend": "盘中偏强", "risk": "弱于指数", "quoteTime": "2026-06-22T15:00:00+08:00"}, {"name": "光启技术", "code": "002625.SZ", "price": 32.51, "change": -1.64, "changePct": -4.8, "open": 33.4, "high": 33.4, "low": 30.86, "volume": 77711481, "amount": 2485556422.21, "trend": "盘中偏弱", "risk": "弱于指数", "quoteTime": "2026-06-22T15:00:00+08:00"}, {"name": "迅游科技", "code": "300467.SZ", "price": 36.45, "change": 0.7, "changePct": 1.96, "open": 35.45, "high": 37.45, "low": 35.43, "volume": 7826600, "amount": 286375442.0, "trend": "盘中偏强", "risk": "跟随指数", "quoteTime": "2026-06-22T15:36:00+08:00"}, {"name": "伊利股份", "code": "600887.SH", "price": 24.63, "change": 0.37, "changePct": 1.53, "open": 24.2, "high": 24.83, "low": 23.86, "volume": 77568558, "amount": 1887393623.0, "trend": "盘中偏强", "risk": "跟随指数", "quoteTime": "2026-06-22T15:00:03+08:00"}], "weather": {"city": "深圳", "condition": "晴", "temperature": 29, "humidity": 79, "wind": "西南风 12km/h"}, "ui": {"eyebrow": "A股观察"}, "clock": {"clockText": "18:46", "dateText": "6月22日 周一"}};</script>
<script>
const state = {
  market: null,
};

const fallbackData = {
  updatedAt: "2026-06-16T00:03:05+08:00",
  index: {
    name: "上证指数",
    code: "000001.SH",
    price: 4096.47,
    change: 64.96,
    changePct: 1.61,
    volumeTone: "成交额约14036亿",
    trend: "指数偏强",
  },
  stocks: [
    { name: "兴蓉环境", code: "000598.SZ", price: 6.99, changePct: -0.57, trend: "盘中偏弱", risk: "弱于指数" },
    { name: "华润三九", code: "000999.SZ", price: 24.55, changePct: -1.21, trend: "盘中偏弱", risk: "弱于指数" },
    { name: "光启技术", code: "002625.SZ", price: 38.3, changePct: -1.01, trend: "盘中偏弱", risk: "弱于指数" },
    { name: "迅游科技", code: "300467.SZ", price: 33.22, changePct: 1.28, trend: "盘中偏强", risk: "跟随指数" },
    { name: "伊利股份", code: "600887.SH", price: 25.41, changePct: -1.17, trend: "盘中偏弱", risk: "弱于指数" },
  ],
  weather: {
    city: "深圳",
    condition: "阴",
    temperature: 25,
    humidity: 99,
    wind: "东南风 4km/h",
  },
};

function formatSigned(value, suffix = "") {
  const sign = value > 0 ? "+" : "";
  return `${sign}${value.toFixed(2)}${suffix}`;
}

function toneClass(value) {
  if (value > 0) return "up";
  if (value < 0) return "down";
  return "flat";
}

function signalFor(stock) {
  if (stock.changePct <= -1.5) return { label: "控风险", className: "signal-risk" };
  if (stock.changePct >= 2.5) return { label: "不追高", className: "signal-risk" };
  if (stock.changePct >= 0.8) return { label: "持有", className: "signal-hold" };
  return { label: "观察", className: "signal-watch" };
}

function buildMarketSummary(data) {
  const pct = data.index.changePct;
  if (pct >= 0.6) {
    return `${data.index.trend}，${data.index.volumeTone}。仓位可维持，追涨只看强势股回落。`;
  }
  if (pct <= -0.6) {
    return `${data.index.trend}，指数偏弱。先看防守位，减少临盘加仓。`;
  }
  return `${data.index.trend}，市场分歧中。重点看自选股相对强弱，不急着扩大仓位。`;
}

function buildAdvice(data) {
  const strong = data.stocks.filter((item) => item.changePct > data.index.changePct + 1);
  const weak = data.stocks.filter((item) => item.changePct < data.index.changePct - 1.2);
  const list = [];

  if (strong.length) {
    list.push(`强于指数：${strong.slice(0, 2).map((item) => item.name).join("、")}，等回踩确认。`);
  }

  if (weak.length) {
    list.push(`弱于指数：${weak.slice(0, 2).map((item) => item.name).join("、")}，先控仓观察。`);
  }

  list.push(data.index.changePct >= 0 ? "指数偏暖，避免在急拉处新增大仓位。" : "指数偏冷，优先保留现金和确定性。");
  return list.slice(0, 3);
}

function renderStocks(stocks) {
  const root = document.querySelector("#stockList");
  root.innerHTML = "";

  stocks.forEach((stock) => {
    const signal = signalFor(stock);
    const row = document.createElement("div");
    row.className = "stock-row";
    row.innerHTML = `
      <div class="stock-name">
        <strong>${stock.name}</strong>
        <span>${stock.code}</span>
      </div>
      <div>
        <span class="metric-label">现价</span>
        <strong class="stock-price">${stock.price.toFixed(2)}</strong>
      </div>
      <div class="${toneClass(stock.changePct)} stock-change">${formatSigned(stock.changePct, "%")}</div>
      <div class="signal ${signal.className}">${signal.label}</div>
    `;
    root.appendChild(row);
  });
}

function renderAdvice(data) {
  const root = document.querySelector("#adviceList");
  root.innerHTML = "";
  buildAdvice(data).forEach((text) => {
    const item = document.createElement("li");
    item.textContent = text;
    root.appendChild(item);
  });
}

function render(data) {
  state.market = data;
  document.querySelector("#indexTitle").textContent = data.index.name;
  document.querySelector("#eyebrow").textContent = (data.ui && data.ui.eyebrow) || "行情观察";
  document.querySelector("#indexValue").textContent = data.index.price.toFixed(2);
  document.querySelector("#indexChange").className = `change-row ${toneClass(data.index.change)}`;
  document.querySelector("#indexChange").textContent = `${formatSigned(data.index.change)} / ${formatSigned(data.index.changePct, "%")}`;
  document.querySelector("#marketSummary").textContent = buildMarketSummary(data);
  document.querySelector("#weatherIcon").textContent = data.weather.condition;
  document.querySelector("#weatherTemp").textContent = `${data.weather.temperature}°`;
  document.querySelector("#weatherMeta").textContent = `${data.weather.city} · 湿度${data.weather.humidity}% · ${data.weather.wind}`;
  document.querySelector("#refreshText").textContent = new Date(data.updatedAt).toLocaleTimeString("zh-CN", { hour: "2-digit", minute: "2-digit" });
  renderStocks(data.stocks);
  renderAdvice(data);
  renderClock(data);
  renderSparkline(data.index.series);
}

function renderClock(data) {
  // 优先用服务端注入的北京时间快照，不依赖设备时区或 JS 跑时钟
  if (data && data.clock && data.clock.clockText) {
    document.querySelector("#dateText").textContent = data.clock.dateText;
    document.querySelector("#timeText").textContent = data.clock.clockText;
    return;
  }
  const now = new Date();
  document.querySelector("#dateText").textContent = now.toLocaleDateString("zh-CN", {
    month: "2-digit",
    day: "2-digit",
    weekday: "short",
  });
  document.querySelector("#timeText").textContent = now.toLocaleTimeString("zh-CN", {
    hour: "2-digit",
    minute: "2-digit",
  });
}

function renderSparkline(series) {
  // 分时折线用 SVG 实色（蓝）绘制，符合 6 色约束；无数据则隐藏整个区域
  const root = document.querySelector("#indexSparkline");
  if (!series || series.length < 2) {
    root.style.display = "none";
    return;
  }
  root.style.display = "";
  const w = 100;
  const h = 100;
  const min = Math.min(...series);
  const max = Math.max(...series);
  const range = max - min || 1;
  const pts = series
    .map((v, i) => `${((i / (series.length - 1)) * w).toFixed(1)},${(h - ((v - min) / range) * h).toFixed(1)}`)
    .join(" ");
  root.innerHTML =
    `<svg viewBox="0 0 ${w} ${h}" preserveAspectRatio="none">` +
    `<polyline points="${pts}" fill="none" stroke="#1565c0" stroke-width="3" vector-effect="non-scaling-stroke" />` +
    `</svg>`;
}

async function loadData() {
  if (window.PANEL_DATA) {
    return window.PANEL_DATA;
  }

  const dataFiles = ["data/market.json", "data/sample-market.json"];

  for (const file of dataFiles) {
    try {
      const response = await fetch(file, { cache: "no-store" });
      if (!response.ok) throw new Error(`${file} unavailable`);
      return await response.json();
    } catch {
      // Try the next data source.
    }
  }

  return fallbackData;
}

// 时钟由服务端快照驱动（每次整页刷新时随 render 更新），无需 setInterval。
// 原因：SenseCraft 设备可能是静态截图渲染模式，setInterval 不会持续触发。
loadData().then(render);

</script>

</html>
